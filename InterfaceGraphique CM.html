<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Page MIP 10</title>
  <link rel="stylesheet" href="styleCM.css">
</head>
<body>

  <div class="tablet">
    <div class="tablet-header">
      <span class="dot"></span>
      <span class="title">Pourcentage Contamination</span>
    </div>

    <div class="tablet-body">
      <div class="row">
        <!-- Wrapper pour la jauge + barres de repère -->
        <div class="jauge-wrapper">
          <div class="jauge-separators">
            <!-- barres tous les 10 % (0 à 100) -->
            <span class="sep" style="left: 0%;"></span>
            <span class="sep" style="left: 10%;"></span>
            <span class="sep" style="left: 20%;"></span>
            <span class="sep" style="left: 30%;"></span>
            <span class="sep" style="left: 40%;"></span>
            <span class="sep" style="left: 50%;"></span>
            <span class="sep" style="left: 60%;"></span>
            <span class="sep" style="left: 70%;"></span>
            <span class="sep" style="left: 80%;"></span>
            <span class="sep" style="left: 90%;"></span>
            <span class="sep" style="left: 100%;"></span>
          </div>

          <!-- Slider linéaire 0–1000 -->
          <input
            type="range"
            id="jauge"
            name="jauge"
            min="0"
            max="1000"
            step="1"
            value="0"
          >
        </div>

        <!-- Affiche la valeur entière -->
        <p id="valeur">0</p>
      </div>
    </div>
  </div>

  <script>
    const jauge  = document.getElementById('jauge');
    const valeur = document.getElementById('valeur');

    function sendValue(vInt) {
      const formData = new FormData();
      formData.append('value', vInt.toString());

      fetch('http://localhost:5000/slider', {
        method: 'POST',
        body: formData
      });
    }

    // couleur selon la valeur (0–1000)
    function updateColor(vInt) {
      let color;
      if (vInt < 300) {
        color = '#22c55e';   // vert
      } else if (vInt < 800) {
        color = '#f97316';   // orange
      } else {
        color = '#ef4444';   // rouge
      }
      document.documentElement.style.setProperty('--jauge-color', color);
    }

    function updateFromSlider() {
      const intValue = Number(jauge.value);   // 0–1000
      valeur.textContent = intValue.toString();
      updateColor(intValue);
      return intValue;
    }

    // mise à jour visuelle en temps réel
    jauge.addEventListener('input', function () {
      updateFromSlider();
    });

    // envoi au Python seulement quand on lâche la jauge
    jauge.addEventListener('change', function () {
      const intValue = updateFromSlider();
      sendValue(intValue);
    });

    // init
    updateFromSlider();
  </script>

</body>
</html>
