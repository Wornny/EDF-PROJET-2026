<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CM ID {{ cm_id }}</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='styleCM.css') }}">
  <script defer src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body data-cm-id="{{ cm_id }}">

<div class="tablet">

  <!-- ===== DRAWER GAUCHE ===== -->
  <div class="side-panel" id="sidePanel">

    <div class="side-panel-inner" id="sidePanelInner">
      <button class="refresh-btn" onclick="location.reload()">⟳</button>

      <div class="cm-list">
        <a class="cm-btn" href="/CapteurMobile/1">CM ID 1</a>
        <a class="cm-btn" href="/CapteurMobile/2">CM ID 2</a>
        <a class="cm-btn" href="/CapteurMobile/3">CM ID 3</a>
        <a class="cm-btn" href="/CapteurMobile/4">CM ID 4</a>
        <a class="cm-btn" href="/CapteurMobile/5">CM ID 5</a>
        <a class="cm-btn" href="/CapteurMobile/6">CM ID 6</a>
        <a class="cm-btn" href="/CapteurMobile/7">CM ID 7</a>
        <a class="cm-btn" href="/CapteurMobile/8">CM ID 8</a>
        <a class="cm-btn" href="/CapteurMobile/9">CM ID 9</a>
        <a class="cm-btn" href="/CapteurMobile/10">CM ID 10</a>
        <a class="cm-btn" href="/CapteurMobile/11">CM ID 11</a>
        <button class="cm-btn cm-add">+</button>
      </div>
    </div>

    <button class="drawer-toggle" id="drawerToggle">◀</button>
  </div>

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <span class="title">CM ID {{ cm_id }}</span>
    <span class="home">🏠</span>
  </div>

  <!-- ===== ZONE DROITE ===== -->
  <div class="right-area">

    <div class="detector-panel">
      <div class="detector-title">
        <span>Niveau Contamination</span>
        <span class="value-box">
          <span id="valeur">{{ valeur_init }}</span> Bq/cm²
        </span>
      </div>

      <div class="detector-content">
        <div class="beta-icon">β</div>

        <div class="gauge-zone">
          <div class="gauge-bg">

            <div class="gauge-mask" id="gaugeMask"></div>

            <div class="gauge-separators">
              <span style="left:0%"></span>
              <span style="left:20%"></span>
              <span style="left:40%"></span>
              <span style="left:60%"></span>
              <span style="left:80%"></span>
              <span style="left:100%"></span>
            </div>

            <!-- ✅ CURSEUR TYPE AIGUILLE -->
            <div class="gauge-cursor" id="gaugeCursor">
              <div class="handle"></div>
            </div>

          </div>

          <div class="scale">
            <span style="left:0%">0</span>
            <span style="left:20%">1</span>
            <span style="left:40%">10</span>
            <span style="left:60%">100</span>
            <span style="left:80%">1000</span>
            <span style="left:100%">C/S</span>
          </div>

          <input type="range" id="jauge" min="0" max="1000" step="1" value="0">
        </div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
