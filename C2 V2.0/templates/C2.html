<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>C2 - Capteurs</title>
    <link rel="stylesheet" href="../static/C2.css">
</head>
<body data-c2-id="C2_{{ c2_id }}">
<!-- DRAWER GAUCHE -->
<div class="drawer" id="drawer">
    <div class="drawer-content">
        <h2>Panneau de Contrôle</h2>
        <div class="drawer-section">
            <div class="cm-list">
                <a class="cm-btn {% if c2_id == 1 %}active{% endif %}" href="/C2/1">C2 ID 1</a>
                <a class="cm-btn {% if c2_id == 2 %}active{% endif %}" href="/C2/2">C2 ID 2</a>
                <button class="cm-btn cm-add">+</button>
            </div>
        </div>
        <div class="drawer-section">
        </div>
    </div>
</div>

<!-- TOGGLE BUTTON (Rectangle avec triangle) -->
<button class="drawer-toggle-btn" id="drawerToggle"></button>

<!-- DRAWER DROIT (vide pour l'instant) -->
<div class="drawer-right" id="drawerRight">
    <div class="drawer-content">
        <!-- vide pour l'instant -->
    </div>
</div>

<!-- TOGGLE BUTTON DROIT (Rectangle avec triangle) -->
<button class="drawer-toggle-btn-right" id="drawerToggleRight"></button>

<div class="banner">
    <div class="banner-text"></div>
    <p class="c2-id-display">C2 ID : C2_{{ c2_id }}</p>
</div>

        <div id="page"></div>

        <div class="c2-container">

            <!-- <img src="" class="c2-bg" alt="C2 fond"> -->
