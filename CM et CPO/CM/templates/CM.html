<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Controleur Mobile - MIP10</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../static/styleCM.css">
  <script>
    // Initialiser l'état du drawer AVANT le rendu pour éviter les animations
    if (localStorage.getItem("drawerOpen") === "true") {
      document.documentElement.style.setProperty('--drawer-initial', 'translateX(0)');
      document.documentElement.style.setProperty('--toggle-initial', '220px');
      document.documentElement.style.setProperty('--arrow-initial', 'scaleX(-1)');
    }
  </script>
  <script defer src="../static/scriptCM.js"></script>
</head>

<body data-cm-id="{{ cm_id }}">

<!-- DRAWER GAUCHE -->
<div class="drawer" id="drawer">
  <div class="drawer-content">
    <h2>Panneau de Contrôle</h2>
    <div class="drawer-section">
      <div class="cm-list">
        <a class="cm-btn {% if cm_id == 1 %}active{% endif %}" href="/ControllerMobile/1">CM ID 1</a>
        <a class="cm-btn {% if cm_id == 2 %}active{% endif %}" href="/ControllerMobile/2">CM ID 2</a>
        <a class="cm-btn {% if cm_id == 3 %}active{% endif %}" href="/ControllerMobile/3">CM ID 3</a>
        <a class="cm-btn {% if cm_id == 4 %}active{% endif %}" href="/ControllerMobile/4">CM ID 4</a>
        <a class="cm-btn {% if cm_id == 5 %}active{% endif %}" href="/ControllerMobile/5">CM ID 5</a>
        <a class="cm-btn {% if cm_id == 6 %}active{% endif %}" href="/ControllerMobile/6">CM ID 6</a>
        <a class="cm-btn {% if cm_id == 7 %}active{% endif %}" href="/ControllerMobile/7">CM ID 7</a>
        <a class="cm-btn {% if cm_id == 8 %}active{% endif %}" href="/ControllerMobile/8">CM ID 8</a>
        <a class="cm-btn {% if cm_id == 9 %}active{% endif %}" href="/ControllerMobile/9">CM ID 9</a>
        <a class="cm-btn {% if cm_id == 10 %}active{% endif %}" href="/ControllerMobile/10">CM ID 10</a>
        <a class="cm-btn {% if cm_id == 11 %}active{% endif %}" href="/ControllerMobile/11">CM ID 11</a>
        <a class="cm-btn cm-add" id="cm-add" href="#" title="Ajouter un appareil">+</a>
      </div>
    </div>
  </div>
</div>

<!-- TOGGLE BUTTON -->
<button class="drawer-toggle-btn" id="drawerToggle"></button>

<!-- BANNER -->
<div class="banner">
  <p class="cm-id-display">CM ID : {{ cm_id }}</p>
</div>

<div class="tablet">

  <!-- ================== ZONE DROITE ================== -->
  <div class="right-area">

    <!-- ===== PANEL NIVEAU CONTAMINATION ===== -->
    <div class="detector-panel">

      <div class="detector-title">
        <span>Niveau Contamination</span>

        <span class="value-box value-green" id="valueBox">
          <span id="valeur">{{ valeur_conta }}</span> Bq/cm²
        </span>
      </div>

      <div class="detector-content">
        <div class="beta-icon">β</div>

        <div class="gauge-zone">

          <!-- overlay triangle -->
          <div class="gauge-overlay">
            <div class="gauge-triangle" id="gaugeTriangle"></div>
          </div>

          <!-- barre -->
          <div class="gauge-bg" id="gaugeBg">
            <div class="gauge-mask" id="gaugeMask"></div>

            <div class="gauge-separators">
              <span style="left:0%"></span>
              <span style="left:20%"></span>
              <span style="left:40%"></span>
              <span style="left:60%"></span>
              <span style="left:80%"></span>
              <span style="left:100%"></span>
            </div>
          </div>

          <!-- échelle -->
          <div class="scale">
            <span style="left:0%">0</span>
            <span style="left:20%">1</span>
            <span style="left:40%">10</span>
            <span style="left:60%">100</span>
            <span style="left:80%">1000</span>
            <span style="left:100%">C/S</span>
          </div>

          <!-- slider invisible -->
          <input type="range" id="jauge" min="0" max="1000" step="1" value="0">
        </div>

        <!-- bouton envoyer -->
        <button class="send-btn" id="sendBtn" title="Envoyer les valeurs au MQTT"></button>
      </div>
    </div>

    <!-- ✅ ===== PANEL BRUIT DE FOND (AJOUTÉ) ===== -->
    <div class="detector-panel">

      <div class="detector-title">
        <span>Bruit de Fond</span>

        <span class="value-box value-green" id="valueBox_bdf">
          <span id="valeur_bdf">{{ valeur_bdf }}</span> Bq/cm²
        </span>
      </div>

      <div class="detector-content">
        <div class="beta-icon">β</div>

        <div class="gauge-zone">

          <!-- overlay triangle -->
          <div class="gauge-overlay" id="gaugeOverlay_bdf">
            <div class="gauge-triangle" id="gaugeTriangle_bdf"></div>
          </div>

          <!-- barre -->
          <div class="gauge-bg" id="gaugeBg_bdf">
            <div class="gauge-mask" id="gaugeMask_bdf"></div>

            <div class="gauge-separators">
              <span style="left:0%"></span>
              <span style="left:20%"></span>
              <span style="left:40%"></span>
              <span style="left:60%"></span>
              <span style="left:80%"></span>
              <span style="left:100%"></span>
            </div>
          </div>

          <!-- échelle -->
          <div class="scale">
            <span style="left:0%">0</span>
            <span style="left:20%">1</span>
            <span style="left:40%">10</span>
            <span style="left:60%">100</span>
            <span style="left:80%">1000</span>
            <span style="left:100%">C/S</span>
          </div>

          <!-- slider invisible -->
          <input type="range" id="jauge_bdf" min="0" max="1000" step="1" value="0">
        </div>

        <!-- placeholder pour aligner avec le bouton du haut -->
        <div style="width: 76px; height: 76px;"></div>
      </div>
    </div>

  </div>

</div>

<!-- BOUTON + POUR AJOUTER UN APPAREIL -->
<div class="cm-modal" id="cm-modal" aria-hidden="true">
  <div class="cm-modal-card" role="dialog" aria-modal="true" aria-labelledby="cm-modal-title">
    <button class="cm-modal-close" id="cm-modal-close" aria-label="Fermer">X</button>
    <h3 class="cm-modal-title" id="cm-modal-title">Ajouter un appareil</h3>
    <div class="cm-modal-row">
      <label class="cm-modal-label" for="cm-modal-input">Nom du nouvel appareil :</label>
      <input class="cm-modal-input" id="cm-modal-input" type="text" placeholder="Ex: CM Mobile 12">
      <div class="cm-modal-error" id="cm-modal-error" aria-live="polite"></div>
    </div>
    <div class="cm-modal-row">
      <label class="cm-modal-label" for="cm-modal-type">Type :</label>
      <select class="cm-modal-select" id="cm-modal-type">
        <option value="CPO">CPO</option>
        <option value="CM" selected>CM</option>
        <option value="C2">C2</option>
        <option value="Initialisateur">Initialisateur</option>
      </select>
    </div>
    <button class="cm-modal-submit" id="cm-modal-submit">valider</button>
  </div>
</div>
</body>
</html>
