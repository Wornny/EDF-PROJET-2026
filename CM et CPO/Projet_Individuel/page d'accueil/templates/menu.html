<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu EDF 3D</title>
  <link rel="stylesheet" href="../static/menu.css" />
</head>
<body>
  <div class="container">
    <img class="logo" src="../static/EDF Logo.png" alt="EDF Logo" />

    <h2 class="title-pill">SELECTIONNER UN APPAREIL</h2>

    <div class="carousel-wrapper">
      <div class="carousel">
        <div class="device" data-label="Controleur mobile">
          <img src="../static/Mip10_color.png" alt="Controleur mobile" />
          <div class="label">Controleur mobile</div>
        </div>
        <div class="device" data-label="CPO">
          <img src="../static/CP0Color.png" alt="CPO" />
          <div class="label">CPO</div>
        </div>
        <div class="device" data-label="Initialisateur">
          <img src="/static/Initialisateur.png" alt="Initialisateur" />
          <div class="label">Initialisateur</div>
        </div>
        <div class="device" data-label="C2">
          <img src="../static/C2capteurColor.png" alt="C2" />
          <div class="label">C2</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="footer-text" id="selected-label">CPO</div>
    </div>
  </div>

 <script>
  (function(){
    var src = "{{ url_for('static', filename='menu.js') }}";
    var finalSrc = (typeof src === 'string' && src.includes('url_for')) ? "../static/menu.js" : src;
    var s = document.createElement('script');
    s.src = finalSrc;
    document.body.appendChild(s);
  })();
</script>

</body>
</html>
