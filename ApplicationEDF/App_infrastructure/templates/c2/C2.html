<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>C2 - Capteurs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='C2/styleC2.css') }}?v=2">
    <script>
        if (localStorage.getItem("drawerOpen") === "true") {
            document.documentElement.style.setProperty('--drawer-initial', 'translateX(0)');
            document.documentElement.style.setProperty('--toggle-initial', '220px');
            document.documentElement.style.setProperty('--arrow-initial', 'scaleX(-1)');
        }
        if (localStorage.getItem("drawerRightOpen") === "true") {
            document.documentElement.style.setProperty('--drawer-right-initial', 'translateX(0)');
            document.documentElement.style.setProperty('--toggle-right-initial', '220px');
            document.documentElement.style.setProperty('--arrow-right-initial', 'scaleX(-1)');
        }
    </script>
</head>
<body data-c2-id="C2_{{ c2_id }}" data-c2-gender="{{ current_gender }}">
<!-- DRAWER GAUCHE -->
<div class="drawer" id="drawer">
    <div class="drawer-content">
        <h2>Panneau de Contrôle</h2>
        <div class="drawer-section">
            <div class="id-list">
                {% for i in c2_ids %}
                <div class="id-item">
                    <a class="id-btn {% if c2_id == i %}active{% endif %}" href="/C2/{{ i }}">{{ c2_names[i] }}</a>
                    {% if role == "admin" %}<button class="id-delete" type="button" data-id="{{ i }}" title="Supprimer"><span class="id-delete-mark">-</span></button>{% endif %}
                </div>
                {% endfor %}
                {% if role == "admin" %}<a class="id-btn id-add" id="id-add" href="#" title="Ajouter un appareil">+</a>{% endif %}
            </div>
        </div>
        <div class="drawer-section">
        </div>
    </div>
</div>

<!-- TOGGLE BUTTON (Rectangle avec triangle) -->
<button class="drawer-toggle-btn" id="drawerToggle"></button>

<!-- DRAWER DROIT (vide pour l'instant) -->
<div class="drawer-right" id="drawerRight">
    <div class="drawer-content">
        <!-- vide pour l'instant -->
    </div>
</div>

<!-- TOGGLE BUTTON DROIT (Rectangle avec triangle) -->
<button class="drawer-toggle-btn-right" id="drawerToggleRight"></button>

<div class="banner">
    <div class="banner-text"></div>
    <p class="c2-id-display">C2 Id : {{ c2_id }}</p>
    <a class="home-link" href="{{ url_for('accueil.menu') }}" title="Accueil" aria-label="Accueil">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M3 10.5L12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5H6a1.5 1.5 0 0 1-1.5-1.5v-9Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
      <path d="M9 20v-6h6v6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
    </svg>
  </a>
  <button class="control-btn-reset" id="resetCapsBtn" type="button" title="Réinitialiser les capteurs" aria-label="Réinitialiser les capteurs">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                            focusable="false"
                        >
                            <path d="M6 7a7 7 0 1 1 2.05 9.9" />
                            <polyline points="6 3 6 7 10 7" />
                            <line x1="4" y1="20" x2="20" y2="4" />
                        </svg>
