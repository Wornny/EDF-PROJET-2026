<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg" href="../static/login/img/EDF.jpg">
    <title>EDF - Connexion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login/login.css') }}">
</head>
<body>
    <div class="login-container">
        <h2>Connexion</h2>
        {% if error %}
            <p style="color:red">{{ error }}</p>
        {% endif %}
        <form method="POST">  
            <div class="form-group">
                <label>Identifiant :</label>
                <input type="text" name="login" required {% if locked %}disabled{% endif %}>
            </div>
            <div class="form-group">
                <label>Mot de passe :</label>
                <input type="password" name="password" required {% if locked %}disabled{% endif %}>
            </div>
            <button type="submit" {% if locked %}disabled{% endif %}>Se connecter</button>
        </form>
    </div>
</body>
</html>
