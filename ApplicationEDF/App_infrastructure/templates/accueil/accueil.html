<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/jpeg" href="../static/accueil/img/EDF.jpg">
  <title>Accueil</title>
  <script src="{{ url_for('static', filename='accueil/forcer_reconnexion_reouverture_onglet.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='accueil/accueil.css') }}?v=13" />
</head>
<body class="menu-page">
  {% if session.get('role') == 'admin' %}
  <div class="settings-button">
    <a href="{{ url_for('reglages.reglages_page') }}" class="btn-settings">Réglages</a>
  </div>
  {% endif %}
  <div class="logout-button">
    <a href="{{ url_for('login.deconnexion') }}" class="btn-logout">Déconnexion</a>
  </div>
  <div class="container">
    <img class="logo" src="{{ url_for('static', filename='accueil/img/EDF Logo.png') }}" alt="EDF Logo" />

    <h2 class="title-pill">SELECTIONNER UN APPAREIL</h2>

    <div class="carousel-wrapper">
      <div class="carousel">
        <div class="device" data-label="Controleur mobile">
          <img src="{{ url_for('static', filename='accueil/img/Mip10_color.png') }}" alt="Controleur mobile" />
          <div class="label">Controleur mobile</div>
        </div>
        <div class="device" data-label="CPO">
          <img src="{{ url_for('static', filename='accueil/img/CP0Color.png') }}" alt="CPO" />
          <div class="label">CPO</div>
        </div>
        <div class="device" data-label="Initialisateur">
          <img src="{{ url_for('static', filename='accueil/img/initialisateur.png') }}" alt="Initialisateur" />
          <div class="label">Initialisateur</div>
        </div>
        <div class="device" data-label="C2">
          <img src="{{ url_for('static', filename='accueil/img/C2Color.png') }}" alt="C2" />
          <div class="label">C2</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="footer-text" id="selected-label">CPO</div>
    </div>
  </div>

  <script defer src="{{ url_for('static', filename='accueil/accueil.js') }}?v=4"></script>


</body>
</html>
