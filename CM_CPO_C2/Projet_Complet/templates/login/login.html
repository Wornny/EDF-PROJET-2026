<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page de Connexion</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login/login.css') }}">
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn" title="Plein écran" aria-label="Plein écran">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/>
        </svg>
    </button>
    <div class="login-container">
        <h2>Connexion</h2>
        {% if error %}
            <p style="color:red">{{ error }}</p>
        {% endif %}
        <form method="POST">  
            <div class="form-group">
                <label>Login :</label>
                <input type="text" name="login" required>
            </div>
            <div class="form-group">
                <label>Mot de passe :</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Se connecter</button>
        </form>
    </div>
    <script defer src="{{ url_for('static', filename='common/fullscreen.js') }}"></script>
</body>
</html>
